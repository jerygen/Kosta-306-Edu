<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JAVA Exam Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script>
        async function getResponse() {
            const message = document.getElementById('message').value;
            const subject = document.getElementById('subject').value;
            const tone = document.getElementById('tone').value;

            const responseDiv = document.getElementById('response');

            responseDiv.innerText = '응답을 생성중입니다.';
            responseDiv.style.display = 'block';
            try {
                // const response = await fetch(`/chat?subject=${encodeURIComponent(subject)}&tone=${encodeURIComponent(tone)}&message=${encodeURIComponent(message)}`);
                let response;
                if (document.getElementById('past-exam').checked){
                    response = await fetch(`/ragchat?subject=${encodeURIComponent(subject)}&tone=${encodeURIComponent(tone)}&message=${encodeURIComponent(message)}`);
                } else {
                    response = await fetch(`/chat?subject=${encodeURIComponent(subject)}&tone=${encodeURIComponent(tone)}&message=${encodeURIComponent(message)}`);
                }

                const result = await response.text();

                responseDiv.innerText = result;
            } catch (error) {
                console.error('Error:', error);
                responseDiv.innerText = '오류가 발생했습니다.';
            }
        }
    </script>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">JAVA Exam Agent</h2>
    <div class="form-group">
        <input type="checkbox" id="past-exam"> 기출문제 <br>
        주제: <input type="text" id="subject" value="JVM"><br>
        대화톤: <input type="text" id="tone" value="친절하게"><br>
        <label for="message">LLM 에 지시할 내용을 입력하세요:</label>
        <textarea id="message" rows="2" class="form-control" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"></textarea>
    </div>
    <button class="btn btn-primary mt-2" onclick="getResponse()">Submit</button>
    <div class="mt-4">
        <div id="response" class="alert alert-info" role="alert" style="display: none;"></div>
    </div>
</div>
</body>
</html>
