spring.application.name=hiring
server.port=8084

#키값은 value로 주입받을 수 있음, hiring이 job을 호출해야 함
job-service.url=http://localhost:8082

spring.jpa.defer-datasource-initialization=true

# Spring expects these properties when the Google / OpenAI modules are on the classpath.
# For now we use dummy values. Real keys will be loaded from secrets.env.
spring.ai.google.genai.api-key=dummy
spring.ai.openai.api-key=dummy
spring.config.import=optional:file:secrets.env[.properties]
#spring.profiles.active=google
spring.profiles.active=openai
#spring.profiles.active=ollama

###############
## SQL을 콘솔에 출력 (기본형)
#spring.jpa.show-sql=true
## H2 콘솔 활성화 (브라우저에서 접속 가능하게 함)
spring.h2.console.enabled=true
## 콘솔 접속 경로 설정 (기본값: /h2-console)
spring.h2.console.path=/h2-console
## JDBC URL 설정 (mem: 뒤의 이름은 자유롭게 지정, 고정해야 찾기 쉬움)
## DB_CLOSE_DELAY=-1: 애플리케이션 실행 중 마지막 연결이 끊겨도 DB가 닫히지 않게 함
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
