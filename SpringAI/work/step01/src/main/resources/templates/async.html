<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JAVA Exam Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384
QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script>
        async function getResponse() {
            const message = document.getElementById('message').value;
            const responseDiv = document.getElementById('response');
            responseDiv.innerText = '응답을 생성중입니다.';
            responseDiv.style.display = 'block';
            try {

                const response = await fetch(`/chat-async?message=${encodeURIComponent(message)}`);
                const reader = response.body.getReader();
                await processStream(reader, responseDiv);
            } catch (error) {
                //서버가보내주는데이터를'스트림'으로 읽기위해 reader 객체를 생성합니다. 이제 데이터를 통째로 받는게 아니라
                //조각(Chunk) 단위로 읽을 준비가 되었습니다.
                console.error('Error:', error);
                responseDiv.innerText = '오류가 발생했습니다.';
            }
        }
        async function processStream(reader, contentElement) {
            const decoder = new TextDecoder('utf-8');
            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    //스트림의 다음 조각을 가져옵니다.
                    contentElement.innerHTML += decoder.decode(value, { stream: true });
                }
            } catch (error) {



                //바이트데이터(value)를 문자로 해독,
                console.error('Error processing stream:', error);
                //한글처럼 여러바이트가 합쳐져야 하는 문자가 중간에 잘려서 들어와도
                //다음 조각과 합쳐서 정상적으로 출력되게 해줍니다.
                contentElement.innerHTML += '<br><span class="text-danger">[Stream interrupted]</span>';
            }
        }

    </script>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">JAVA Exam Agent</h2>
    <div class="form-group">
        <label for="message">LLM 에 지시할 내용을 입력하세요:</label>
        <textarea id="message" rows="2" class="form-control" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"></textarea>
    </div>
    <button class="btn btn-primary mt-2" onclick="getResponse()">Submit</button>
    <div class="mt-4">
        <div id="response" class="alert alert-info" role="alert" style="display: none;"></div>
    </div>
</div>
</body>
</html>
