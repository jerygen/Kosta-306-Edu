<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Promise then 사용하기 - (하나 - 둘 - 셋)</h1>
    <script>
      console.log("-------start---------");

      const taskA = () => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve("하나");
          }, 2000);
        });
      };

      const taskB = () => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            //resolve("둘");
            //reject("실패")
            reject(new Error("문제 발생"));
          }, 1000);
        });
      };

      const taskC = () => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve("셋");
          }, 1500);
        });
      };

      //호출
      taskA()
        .then((result) => {
          console.log("taskA = " + result);
          return taskB();
        })
        .then((result) => {
          console.log("taskB = " + result);
          return taskC();
        })
        .then((result) => {
          console.log("taskC = " + result);
        })
        .catch((err) => {
          //console.log("err = " + err);
          //객체를 사용한 경우
          console.log(err);
          console.log(err.name);

        })
        .finally(() => {
          console.log("promise 끝");
        });

      console.log("---------end---------");
    </script>
  </body>
</html>
