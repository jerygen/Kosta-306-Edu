<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>async와 await 사용하기 - 하나 둘 셋</h1>
    <script>
      const taskA = () => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve("하나");
          }, 2000);
        });
      };

      const taskB = (param) => {
        console.log("taskA의 결과를 taskB에서 출력: " + param);
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve("둘");
            //reject("실패");
            //reject(new Error("문제 발생"));
          }, 1000);
        });
      };

      const taskC = (param) => {
        console.log("taskB의 결과를 taskC에서 출력: " + param);
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve("셋");
          }, 1500);
        });
      };

      const test = async () => {
        try {
          let resultA = await taskA(); //호출, 이걸 사용하고 있는 함수(test) 자체가 async여야 한다.
          console.log(resultA);

          let resultB = await taskB(resultA);
          console.log(resultB);

          let resultC = await taskC(resultB);
          console.log(resultC);
        } catch (err) {
          console.log(err);
        } finally {
          console.log("무조건 실행");
        }
      };

      //함수 호출
      const t = test();
      console.log(t);
    </script>
  </body>
</html>
