<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        height: 100vh;
        display: grid;
        grid-template-columns: 3fr 1fr;
        grid-template-rows: 100px auto 50px;

        grid-template-areas: "header header" "main aside" "footer footer";
      }
      header {
        grid-area: header;
        background-color: rgb(179, 252, 252);
      }
      main {
        grid-area: main;
        background-color: antiquewhite;
        padding: 30px;
      }
      aside {
        grid-area: aside;
        background-color: rgb(255, 248, 150);
      }
      footer {
        grid-area: footer;
        background-color: rgb(215, 250, 225);
      }
      /*main 영역*/
      .main {
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: 100px;

        grid-template-areas: "a a a" "b c c" "d e f" "d g f";
      }
      img {
        width: 100%;
        height: 100%;
        opacity: 0.8;
        border-radius: 10px;
      }
      .img1 {
        grid-area: a;
      }
      .img2 {
        grid-area: b;
      }
      .img3 {
        grid-area: c;
      }
      .img4 {
        grid-area: d;
      }
      .img5 {
        grid-area: e;
      }
      .img6 {
        grid-area: f;
      }
      .img7 {
        grid-area: g;
      }
    </style>
  </head>
  <body>
    <header>header</header>
    <main>
      main
      <div class="main">
        <img src="https://picsum.photos/id/77/200/200" alt="" class="img1" />
        <img src="https://picsum.photos/id/283/200/200" alt="" class="img2" />
        <img src="https://picsum.photos/id/78/200/200" alt="" class="img3" />
        <img src="https://picsum.photos/id/99/200/200" alt="" class="img4" />
        <img src="https://picsum.photos/id/98/200/200" alt="" class="img5" />
        <img src="https://picsum.photos/id/33/200/200" alt="" class="img6" />
        <img src="https://picsum.photos/id/316/200/200" alt="" class="img7" />
      </div>
    </main>
    <aside>사이드</aside>
    <footer>footer</footer>
  </body>
</html>
