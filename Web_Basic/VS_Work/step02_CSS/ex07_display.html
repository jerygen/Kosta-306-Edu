<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 100px;
        height: 100px;
      }
      .a {
        background-color: pink;
      }
      .b {
        background-color: greenyellow;
      }
      .c {
        background-color: aqua;
      }

      span {
        width: 100px;
        height: 100px;
      } /*인라인 요소에는 적용 안 됨*/
      #a {
        background-color: pink;
      }
      #b {
        background-color: greenyellow;
        margin-left: 20px;
        margin-right: 10px;
        margin-top: 50px; /*인라인 요소에는 margin-top, margin-botton은 적용 안 됨*/
        /*display: block;*/
        display: inline-block;
      }
      #c {
        background-color: aqua;
      }
    </style>
  </head>
  <body>
    <div class="a">div1</div>
    <div class="b">div2</div>
    <div class="c">div3</div>
    <hr />
    <span id="a">span1</span><span id="b">span2</span><span id="c">span3</span>
  </body>
</html>
