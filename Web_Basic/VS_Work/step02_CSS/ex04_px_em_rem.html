<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /*요소를 감싸는 body, html의 크기가 정해져 있어야 요소의 크기도 정해진다.*/
      /* body,
        html {
            height: 100%;
        } */

      .outer {
        background-color: skyblue;
        /* width: 50%;
        height: 50%;*/ /*적용이 안 됨. 비율의 기준이 나를 감싸고 있는 body가 기준이다. */
        /*div 태그는 한 줄을 차지하기 때문에 가로로는 50% 적용, 세로는 element가 차지하는 그 부분만이므로 적용이 안됨.*/
        /*vw, vh - 보여주는 크기 안에서의 비율*/
        width: 50vw;
        height: 50vh;
        font-size: 32px;
      }

      .a {
        background-color: red;
        font-size: 1em;
      }
      .b {
        background-color: rgb(179, 240, 179);
        font-size: 1rem; /*html을 기준으로 기본이 16px*/
      }
      .c {
        background-color: blue;
        font-size: 0.5em;
      }

      /*글꼴 선언*/
      @font-face {
        font-family: "myfont";
        src: url("./font/Gaegu-Regular.ttf");
      }
      /* 글꼴 적용 */
      * {
        font-family: myfont, 궁서체;
      }
    </style>
  </head>
  <body>
    <!-- 단위: px vs em vs rem -->
    <div class="outer">
      단위: px vs em vs rem
      <div class="a">em: 부모노드를 기준으로</div>
      <div class="b">rem: root노드를 기준으로</div>
      <div class="c">px: 해상도를 기준으로</div>
    </div>
  </body>
</html>
