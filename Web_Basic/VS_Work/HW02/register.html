<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Register</h1>
    <!--novalidate는 유효성 체크를 하지 말아달라는 뜻-->
    <form action="" method="post" novalidate>
      <label for="name">이름</label>
      <input
        type="text"
        name="name"
        id="name"
        required
        placeholder="이름은 필수입니다."
      />
      <br />
      <!--placeholder는 값이 있는 게 아니라 힌트일 뿐 넘겨도 아무것도 넘어가지 않는다.-->

      <label for="email">이메일</label>
      이메일<input type="email" name="email" id="email" /><br />

      <label for="phone">전화번호</label>
      전화번호<input type="tel" name="phone" id="phone" /><br />

      <label for="pwd">비밀번호</label>
      비밀번호<input type="password" name="pwd" id="pwd" /><br />

      <label for="pwdcheck">비밀번호 확인</label>
      비밀번호 확인<input type="password" name="pwdcheck" id="pwdcheck" /><br />
      <hr />
      <button>회원가입</button>
    </form>
  </body>
</html>
