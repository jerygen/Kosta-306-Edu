<!doctype html>
<html>
  <head>
    <title>New Document</title>
  </head>

  <body>
    <form name="f">
      직업 :
      <select name="job">
        <option value="0">--선택--</option>
        <option value="백수">백수</option>
        <option value="백조">백조</option>
        <option value="학생">학생</option>
        <option value="날라리">날라리</option>
      </select>
    </form>

    <p></p>
    <div id="result"></div>
    <script>
      document.querySelector("select[name=job]").addEventListener(
        "change",
        function () {
          let sel = event.target;
          let divEle = document.getElementById("result");
          let data = "";

          //선택된 value 값 조회
          data += "선택된 value = " + sel.value + "<br>";

          //선택된 index를 조회
          data += "선택된 value = " + sel.selectedIndex + "<br>";

          divEle.innerHTML = data;

          //<option value="날라리">날라리</option> 하나 생성해서 추가
          let op = new Option("강사", "teacher"); //<option value="teacher">강사</option>
          sel.options[sel.length] = op;

          //option 태그를 삭제
          sel.options[0] = null;
        },
        false,
      );
    </script>
  </body>
</html>
