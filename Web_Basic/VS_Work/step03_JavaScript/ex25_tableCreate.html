<!doctype html>
<html>
  <head>
    <meta charset="EUC-KR" />
    <title>Insert title here</title>
    <style type="text/css">
      table {
        width: 400px;
        border: 1px red solid;
      }
      td,
      th {
        border: 1px gray solid;
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>테이블 동적으로 생성하기</h1>
    <a href="#" id="add">추가하기</a>

    <table id="table">
      <tr>
        <th>이름</th>
        <th>나이</th>
        <th>삭제하기</th>
      </tr>
      <!-- 동적으로 tr 추가 또는 제거  -->
    </table>
    <script>
      //추가하기 버튼을 누르면 tr 추가, insertRow()
      document.querySelector("[id=add]");
      //삭제하기에는 버튼을 추가 -
      //문서가 로딩될 때는 삭제버튼이 없기 때문에(동적) 선택자를 달리 쓴다.
      //부모에 이벤트를 준다. body에 이벤트를 등록
    </script>
  </body>
</html>
