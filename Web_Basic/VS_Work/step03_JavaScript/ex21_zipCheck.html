<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>New Web Project</title>
    <script type="text/javascript">
      onload = () => {
        document.querySelector("[id=zipcode]").onchange = function (e) {
          opener.document.querySelector("[name=zip1]").value =
            e.target.value.substring(0, 3);
          opener.document.querySelector("[name=zip2]").value =
            e.target.value.substring(4, 8);
          opener.document.querySelector("[name=addr]").value =
            e.target.value.substring(8);

          self.close();
        };
      };
    </script>
  </head>
  <body>
    <form name="f">
      우편번호
      <select id="zipcode">
        <option value="0">-- 주소 선택 --</option>
        <option value="123-333 서울시 구로구 구로1동">
          123-333 서울시 구로구 구로1동
        </option>
        <option value="222-222 서울시 청담동 청담3동">
          222-222 서울시 청담동 청담3동
        </option>
        <option value="444-444 부산시 대구동 대로2동">
          444-444 부산시 대구동 대로2동
        </option>
        <option value="555-221 경기도 성남시 분당구 분당1동">
          555-221 경기도 성남시 분당구 분당1동
        </option>
      </select>
    </form>
  </body>
</html>
