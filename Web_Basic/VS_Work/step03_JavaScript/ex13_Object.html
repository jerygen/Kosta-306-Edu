<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Object Key와 value</h1>
    <script>
      const person = {
        name: "희정",
        age: 20,
        print: function () {
          return this.name + "님 나이는 " + this.age + "살입니다.";
        },
      };
      console.log(person);
      console.log(person.name);
      console.log(person.age);
      console.log(person["age"]);
      console.log(person.print());

      ////////////////////////////////////
      //Object의 key와 value의 정보를 알고 싶다.
      let keys = Object.keys(person);
      console.log(keys);

      let values = Object.values(person);
      console.log(values);

      //Object의 key와 value를 한 쌍으로 조회하고 싶다.
      for (let key of keys) {
        console.log(key + " = " + person[key]); //person.key 가 안 됨.
        // key를 변수처럼 쓰고 있기 때문에
      }
      // for( ;; )
      // forEach() -> 콜백함수 사용 가능, 항목마다 다른 일을 할 수 있음, 기능이 필요할 때 사용
      // for( of ) -> 값을 꺼내는 것
      // for( in ) -> 인덱스를 꺼내는 형태
    </script>
  </body>
</html>
