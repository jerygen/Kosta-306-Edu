<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>변수에 대해 알아보자 - (var - ES 5이전) vs (let vs const - ES6)</h1>
    <script>
      /*
            변수 선언 (var 생략도 가능)
            var 변수이름;
            var 변수이름=값;
            */

      var a;
      var b = 20;
      c = 3.14;
      document.write("<h4>");
      document.write("a= " + a + " , " + typeof a + "<br>");
      document.write("b= " + b + " , " + typeof b + "<br>");
      document.write("c= " + c + " , " + typeof c + "<hr>");

      //값 변경
      a = "안녕하세요";
      b = new Array(1, "hi", 3.14, true);
      c = false;

      document.write("a= " + a + " , " + typeof a + "<br>");
      document.write("b= " + b + " , " + typeof b + "<br>");
      document.write("c= " + c + " , " + typeof c + "<hr>");

      /*
            1. 동일한 이름의 변수 또는 함수를 또 선언했다면? - OK

            2. 변수 or 함수를 선언 전에 사용한다면? - OK
            */
      var a = "졸지 말아요";
      document.write("a= " + a + " , " + typeof a + "<hr>");

      document.write("age= " + age + " , " + typeof age + "<hr>");
      document.write("</h4>");

      var age = 10;
      document.write("age= " + age + " , " + typeof age + "<hr>");

      //함수를 호출해보자
      // test();

      //함수에 대해 알아보자
      function test() {
        alert("test() 호출 됨....");
      }

      function test() {
        alert("test() 호출 됨....2");
      }
      /////////////////////////////
      document.write("<h1> 변수의 scope에 대해 알아보자</h1> ");
      //자바스크립트에서 변수의 scope에 대해 알아보자
      var i = 10;
      function test2() {
        var i = 5; //지역변수
        var j = 20; //지역변수
        k = 50; //함수 안에서 선언되는 변수에 var를 생략하면 전역 변수가 된다.
        console.log("i=" + i);
        console.log("this.i=" + this.i);
        console.log("j=" + j);
        console.log("k=" + k);
      }

      function test3() {
        console.log("i=" + i);
        console.log("this.i=" + this.i);
        // console.log("j=" + j);
        console.log("k=" + k);

        //자바스크립트의 변수의 scope은 선언된 위치의 함수 단위
        //{} 블록단위가 아니다.
        console.log("전: index=" + index); //가능, undefined
        for (var index = 0; index < 10; index++) {}

        console.log("전: nickname=" + nickname);
        {
          var nickname = "희정";
        }

        console.log("후: index=" + index); // 가능, 10
        console.log("후: nickname=" + nickname);
      }

      test2();
      test3();
    </script>
  </body>
</html>
